<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jogo da Forca - Web</title>
    <style>
        :root {
            color-scheme: dark;
        }

        body {
            margin: 0;
            font-family: Inter, Arial, sans-serif;
            background: linear-gradient(135deg, #0f172a, #312e81);
            color: #f8fafc;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
        }

        .card {
            width: min(680px, 100%);
            padding: 24px;
            border-radius: 24px;
            background: rgba(15, 23, 42, 0.82);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.28);
            backdrop-filter: blur(14px);
        }

        h1 {
            margin-top: 0;
        }

        .word {
            font-size: 2rem;
            letter-spacing: 0.4rem;
            margin: 20px 0;
        }

        .controls {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }

        button,
        select {
            border: 0;
            border-radius: 999px;
            padding: 10px 16px;
            font-size: 1rem;
            cursor: pointer;
        }

        button {
            background: #38bdf8;
            color: #082f49;
            font-weight: 700;
        }

        .letters {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 16px;
        }

        .letters button {
            min-width: 44px;
        }

        .status {
            margin-top: 16px;
            color: #cbd5e1;
        }
    </style>
</head>

<body>
    <div class="card">
        <h1>Jogo da Forca</h1>
        <p>Versão web inicial com a mesma lógica do jogo em Java.</p>
        <div class="controls">
            <select id="difficulty">
                <option value="FACIL">Fácil</option>
                <option value="MEDIO">Médio</option>
                <option value="DIFICIL">Difícil</option>
                <option value="EXTREMO">Extremo</option>
            </select>
            <button id="startBtn">Iniciar partida</button>
        </div>
        <div id="word" class="word">_ _ _ _</div>
        <div id="status" class="status">Escolha a dificuldade e comece a jogar.</div>
        <div id="letters" class="letters"></div>
    </div>

    <script>
        const wordEl = document.getElementById('word');
        const statusEl = document.getElementById('status');
        const lettersEl = document.getElementById('letters');
        const difficultyEl = document.getElementById('difficulty');
        const startBtn = document.getElementById('startBtn');

        function renderState(state) {
            wordEl.textContent = state.hiddenWord.split('').join(' ');
            statusEl.textContent = `Dificuldade: ${state.difficulty} | Erros: ${state.currentErrors}/${state.maxErrors}`;
            lettersEl.innerHTML = '';
            for (const letter of 'ABCDEFGHIJKLMNOPQRSTUVWXYZ') {
                const button = document.createElement('button');
                button.textContent = letter;
                button.onclick = () => guess(letter);
                lettersEl.appendChild(button);
            }
        }

        async function startGame() {
            const response = await fetch('/api/start', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ difficulty: difficultyEl.value })
            });
            const state = await response.json();
            renderState(state);
        }

        async function guess(letter) {
            const response = await fetch('/api/guess', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ letter })
            });
            const state = await response.json();
            renderState(state);
        }

        startBtn.onclick = startGame;
        startGame();
    </script>
</body>

</html>
