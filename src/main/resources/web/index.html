<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jogo da Forca | Web</title>
    <link rel="stylesheet" href="/styles.css" />
</head>

<body>
    <main>
        <section class="card hero">
            <div>
                <span class="badge">🎮 Projeto portfolio</span>
                <h1>Jogo da Forca</h1>
                <p>Uma versão web moderna do clássico jogo, com a mesma lógica em Java e um visual mais próximo de uma
                    aplicação real.</p>
            </div>
            <div class="badge">⚡ Java + Web</div>
        </section>

        <section class="card">
            <div class="controls">
                <select id="difficulty">
                    <option value="FACIL">Fácil</option>
                    <option value="MEDIO">Médio</option>
                    <option value="DIFICIL">Difícil</option>
                    <option value="EXTREMO">Extremo</option>
                </select>
                <button id="startBtn" class="primary">Iniciar partida</button>
                <button id="resetBtn" class="secondary">Reiniciar</button>
            </div>

            <div class="status-grid">
                <div class="status-box"><strong>Dificuldade:</strong> <span id="difficultyLabel">Fácil</span></div>
                <div class="status-box"><strong>Erros:</strong> <span id="errorsLabel">0 / 0</span></div>
                <div class="status-box"><strong>Status:</strong> <span id="statusLabel">Pronto para jogar</span></div>
            </div>

            <div id="word" class="word">_ _ _ _</div>
            <div id="letters" class="letters"></div>
            <p id="hint" class="footer-note">Escolha a dificuldade e comece a jogar.</p>
        </section>
    </main>

    <script src="/config.js"></script>
    <script>
        const apiBaseUrl = window.APP_CONFIG?.apiBaseUrl || '';
        const wordEl = document.getElementById('word');
        const difficultyLabelEl = document.getElementById('difficultyLabel');
        const errorsLabelEl = document.getElementById('errorsLabel');
        const statusLabelEl = document.getElementById('statusLabel');
        const lettersEl = document.getElementById('letters');
        const hintEl = document.getElementById('hint');
        const difficultyEl = document.getElementById('difficulty');
        const startBtn = document.getElementById('startBtn');
        const resetBtn = document.getElementById('resetBtn');

        let currentState = null;
        let usedLetters = new Set();

        function renderState(state) {
            currentState = state;
            wordEl.textContent = state.hiddenWord.split('').join(' ');
            difficultyLabelEl.textContent = state.difficulty;
            errorsLabelEl.textContent = `${state.currentErrors} / ${state.maxErrors}`;
            statusLabelEl.textContent = state.gameOver ? (state.won ? 'Vitória!' : 'Fim de jogo') : 'Em andamento';
            hintEl.textContent = state.gameOver ? `Resposta: ${state.word} — ${state.definition}` : 'Escolha uma letra e tente descobrir a palavra.';

            lettersEl.innerHTML = '';
            for (const letter of 'ABCDEFGHIJKLMNOPQRSTUVWXYZ') {
                const button = document.createElement('button');
                button.textContent = letter;
                button.className = 'letter-btn';
                if (usedLetters.has(letter)) {
                    button.classList.add('used');
                }
                if (state.hiddenWord.includes(letter)) {
                    button.classList.add('correct');
                }
                button.disabled = state.gameOver || usedLetters.has(letter);
                button.onclick = () => guess(letter);
                lettersEl.appendChild(button);
            }
        }

        async function startGame() {
            usedLetters.clear();
            const response = await fetch(`${apiBaseUrl}/api/start`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ difficulty: difficultyEl.value })
            });
            const state = await response.json();
            renderState(state);
        }

        async function guess(letter) {
            usedLetters.add(letter);
            const response = await fetch(`${apiBaseUrl}/api/guess`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ letter })
            });
            const state = await response.json();
            renderState(state);
        }

        startBtn.onclick = startGame;
        resetBtn.onclick = startGame;
        startGame();
    </script>
</body>

</html>
